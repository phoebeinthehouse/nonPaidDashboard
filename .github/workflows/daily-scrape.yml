name: Daily Video Scrape

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install gspread google-auth playwright pandas requests

      - name: Install Playwright browsers
        run: playwright install chromium && playwright install-deps chromium

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run scraper
        env:
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
        run: python b.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_tracking.csv || true
          git diff --staged --quiet || git commit -m "scrape: $(date -u +%Y-%m-%d)"
          git push || true
